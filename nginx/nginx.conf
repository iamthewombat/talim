worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;

    upstream talim_bridge {
        server talim:8000;
    }

    # Plain HTTP — useful for local development.
    server {
        listen 80;
        server_name _;

        location /talim/ {
            proxy_pass http://talim_bridge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://talim_bridge/talim/health;
        }
    }

    # TLS server for production. Disabled by default — to enable, drop
    # fullchain.pem + privkey.pem into ./nginx/certs/ and uncomment this
    # block. Leaving it active without certs causes nginx to fail to start.
    #
    # server {
    #     listen 443 ssl;
    #     server_name _;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     location /talim/ {
    #         proxy_pass http://talim_bridge;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_read_timeout 60s;
    #     }
    # }
}
