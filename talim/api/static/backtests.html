<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talim Strategies</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="backtests-page">
<header>
  <h1>Strategy Results</h1>
  <div class="controls">
    <a class="nav-link" href="/talim/dashboard/">Operator</a>
    <button id="refresh-btn" type="button">Refresh</button>
    <span class="sep">·</span>
    <span id="auth-state" class="auth-locked">Checking auth…</span>
    <button id="signin-btn" type="button">Sign in</button>
    <span class="sep">·</span>
    <span id="last-refresh" class="muted">never</span>
  </div>
</header>

<nav class="mobile-tabs" aria-label="Strategy sections">
  <button type="button" class="tab active" data-view="rankings">Rankings</button>
  <button type="button" class="tab" data-view="variants">Variations</button>
  <button type="button" class="tab" data-view="detail">Detail</button>
</nav>

<main class="backtests-main">
  <section id="view-rankings" class="bt-view active">
    <div class="panel sticky-filter">
      <div class="panel-title-row">
        <h2>Strategy rankings</h2>
        <button id="toggle-filters" type="button" class="compact">Filters</button>
      </div>
      <form id="backtests-filter" class="filter-row collapsible">
        <label>period <select name="period">
          <option value="">All time</option>
          <option value="90">Last 90 days</option>
          <option value="30">Last 30 days</option>
        </select></label>
        <label>instrument <select name="instrument"><option value="">All instruments</option></select></label>
        <label>bars <select name="timeframe"><option value="">All bars</option></select></label>
        <label>sample <select name="min_trades">
          <option value="20" selected>&ge;20 trades/run</option>
          <option value="100">&ge;100 trades/run</option>
          <option value="0">All (incl. validation re-runs)</option>
        </select></label>
        <label>rank by <select name="sort">
          <option value="sharpe_ratio">Sharpe</option>
          <option value="net_pnl">Total P&amp;L</option>
          <option value="profit_factor">Profit factor</option>
          <option value="win_rate">Win rate</option>
          <option value="max_drawdown">Drawdown</option>
          <option value="total_trades">Trades</option>
        </select></label>
        <button type="submit">Apply</button>
      </form>
    </div>
    <div id="rankings-body" class="rank-list">Loading…</div>
  </section>

  <section id="view-variants" class="bt-view">
    <div id="variants-body">
      <div class="panel"><p class="muted">Pick a strategy in Rankings first.</p></div>
    </div>
  </section>

  <section id="view-detail" class="bt-view">
    <div id="detail-body" class="panel detail-panel">
      <h2>Detail</h2>
      <p class="muted">Pick a variation first.</p>
    </div>
  </section>
</main>

<script src="ui.js"></script>
<script src="backtests.js"></script>
</body>
</html>
